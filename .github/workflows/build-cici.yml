name: Build CiCi APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Checkout Hermes-Agent-Phone
        uses: actions/checkout@v4
        with:
          repository: rfdiosuao/Hermes-Agent-phone
          path: hermes-android

      - name: Fix icon references (drawable → mipmap)
        run: |
          # Fix manifest
          sed -i 's|@drawable/ic_launcher|@mipmap/ic_launcher|g' \
            hermes-android/app/src/main/AndroidManifest.xml
          # Fix layout/resource XML files
          find hermes-android/app/src/main/res -name "*.xml" \
            -exec sed -i 's|@drawable/ic_launcher|@mipmap/ic_launcher|g' {} +
          # Fix Kotlin references (R.drawable → R.mipmap)
          find hermes-android/app/src/main/java -name "*.kt" \
            -exec sed -i 's|R\.drawable\.ic_launcher|R.mipmap.ic_launcher|g' {} +
          echo "✅ All icon references fixed (drawable → mipmap)"

      - name: Apply AgentConfig patch (phone-master 系统提示词)
        run: |
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/agent/AgentConfig.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/agent/AgentConfig.kt
          echo "✅ AgentConfig (phone-master system prompt) patch applied"

      - name: Apply DefaultAgentService patch (auto-learning)
        run: |
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/agent/DefaultAgentService.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/agent/DefaultAgentService.kt
          echo "✅ DefaultAgentService (auto-learning) patch applied"

      - name: Apply DeepSeek thinking mode patch
        run: |
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/agent/langchain/http/OkHttpClientBuilderAdapter.java" \
            hermes-android/app/src/main/java/com/apk/claw/android/agent/langchain/http/OkHttpClientBuilderAdapter.java
          echo "✅ DeepSeek thinking mode patch applied"

      - name: Apply ScreenManager (自动亮屏/息屏)
        run: |
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/scheduler/ScreenManager.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/scheduler/ScreenManager.kt
          echo "✅ ScreenManager applied"

      - name: Apply 增强版 TaskScheduler (多时段/工作日/重试)
        run: |
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/scheduler/TaskScheduler.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/scheduler/TaskScheduler.kt
          echo "✅ TaskScheduler (enhanced) applied"

      - name: Apply 新增调度组件 (ScheduledTaskReceiver + Logger + Templates)
        run: |
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/scheduler/ScheduledTaskReceiver.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/scheduler/ScheduledTaskReceiver.kt
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/scheduler/TaskExecutionLogger.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/scheduler/TaskExecutionLogger.kt
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/scheduler/ScheduledTaskTemplates.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/scheduler/ScheduledTaskTemplates.kt
          echo "✅ ScheduledTaskReceiver + Logger + Templates applied"

      - name: Apply 记忆系统 (MemoryManager + MemoryTools + ToolRegistry)
        run: |
          mkdir -p hermes-android/app/src/main/java/com/apk/claw/android/memory
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/memory/MemoryManager.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/memory/MemoryManager.kt
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/tool/impl/MemoryTools.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/tool/impl/MemoryTools.kt
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/tool/ToolRegistry.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/tool/ToolRegistry.kt
          echo "✅ Memory system applied"

      - name: Apply 增强版定时任务工具 + 调度组件
        run: |
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/tool/impl/ScheduledTaskTools.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/tool/impl/ScheduledTaskTools.kt
          echo "✅ ScheduledTaskTools (enhanced) applied"

      - name: Apply TaskOrchestrator + AppViewModel 定时任务结果回写
        run: |
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/TaskOrchestrator.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/TaskOrchestrator.kt
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/AppViewModel.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/AppViewModel.kt
          echo "✅ TaskOrchestrator + AppViewModel applied"

      - name: Apply 零代码技能系统 (SkillManager + SkillTools + Persona)
        run: |
          mkdir -p hermes-android/app/src/main/java/com/apk/claw/android/skill
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/skill/SkillManager.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/skill/SkillManager.kt
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/tool/impl/SkillTools.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/tool/impl/SkillTools.kt
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/agent/PersonaConfig.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/agent/PersonaConfig.kt
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/server/ConfigServer.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/server/ConfigServer.kt
          echo "✅ Skill system + Persona + ConfigServer applied"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x hermes-android/gradlew

      - name: Patch build config for CI
        working-directory: hermes-android
        run: |
          # 创建 dummy debug keystore 和 local.properties
          keytool -genkey -v -keystore debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=CI, OU=CI, O=CI, L=CI, S=CI, C=CI" 2>/dev/null
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "KEYSTORE_FILE=$(pwd)/debug.keystore" >> local.properties
          echo "KEYSTORE_PASSWORD=android" >> local.properties
          echo "KEY_ALIAS=androiddebugkey" >> local.properties
          echo "KEY_PASSWORD=android" >> local.properties

          # local.properties 已有 keystore 配置

      - name: CiCi 品牌重塑（名字+图标）
        working-directory: hermes-android
        run: |
          set -e
          echo "修改 App 名称..."
          find app/src/main/res -name "strings.xml" -exec sed -i 's/ApkClaw/CiCi/g; s/apk_claw/cici/g' {} +
          echo "替换项目中所有 ApkClaw 引用..."
          find . -type f \( -name "*.xml" -o -name "*.kt" -o -name "*.java" \) \
            -exec sed -i 's/ApkClaw/CiCi/g; s/apk_claw/cici/g' {} + 2>/dev/null || true
          echo "生成 CiCi 图标..."
          python3 "${{ github.workspace }}/scripts/generate_icons.py"

      - name: Compile Kotlin (debug errors first)
        working-directory: hermes-android
        run: |
          echo "=== Running Kotlin compilation ==="
          ./gradlew :app:compileDebugKotlin --no-daemon -Dorg.gradle.jvmargs=-Xmx4g > /tmp/kotlin_output.txt 2>&1
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "### KOTLIN COMPILATION FAILED" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -100 /tmp/kotlin_output.txt >> $GITHUB_STEP_SUMMARY
            echo '...' >> $GITHUB_STEP_SUMMARY
            tail -100 /tmp/kotlin_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -20 /tmp/kotlin_output.txt | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit 1
          fi
          echo "=== Kotlin compilation OK ==="

      - name: Build Debug APK
        working-directory: hermes-android
        run: |
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs=-Xmx4g 2>&1
