name: Build Hermes-Agent-Phone APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Checkout Hermes-Agent-Phone
        uses: actions/checkout@v4
        with:
          repository: rfdiosuao/Hermes-Agent-phone
          path: hermes-android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x hermes-android/gradlew

      - name: Patch build config for CI
        working-directory: hermes-android
        run: |
          # 创建 dummy debug keystore 和 local.properties
          keytool -genkey -v -keystore debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=CI, OU=CI, O=CI, L=CI, S=CI, C=CI" 2>/dev/null
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "KEYSTORE_FILE=$(pwd)/debug.keystore" >> local.properties
          echo "KEYSTORE_PASSWORD=android" >> local.properties
          echo "KEY_ALIAS=androiddebugkey" >> local.properties
          echo "KEY_PASSWORD=android" >> local.properties

          # 添加仓库备选
          cat >> settings.gradle.kts << 'PATCH'
          dependencyResolutionManagement {
              repositories {
                  mavenCentral()
                  google()
              }
          }
          PATCH

      - name: 🔱 AegisPhone 品牌重塑（名字+图标）
        working-directory: hermes-android
        run: |
          set -e

          # ===== 1. 改 App 名称 =====
          echo "📝 修改 App 名称..."
          # 替换所有 strings.xml 中的 ApkClaw 为 AegisPhone
          find app/src/main/res -name "strings.xml" -exec sed -i \
            's/ApkClaw/AegisPhone/g; s/apk_claw/aegis_phone/g' {} +

          # ===== 2. 替换所有文件中的 ApkClaw 引用 =====
          echo "🔄 替换项目内所有 ApkClaw 引用..."
          find . -type f \( -name "*.xml" -o -name "*.kt" -o -name "*.java" -o -name "*.kts" \) \
            -exec sed -i 's/ApkClaw/AegisPhone/g; s/apk_claw/aegis_phone/g' {} + 2>/dev/null || true

          # ===== 3. 生成 AegisPhone 图标 =====
          echo "🎨 生成 AegisPhone 图标..."
          python3 -c "
import struct, zlib, os

def make_png(width, height, r, g, b):
    \"\"\"从零生成纯色 PNG（不依赖任何第三方库）\"\"\"
    def chunk(chunk_type, data):
        c = chunk_type + data
        return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)

    header = b'\\x89PNG\\r\\n\\x1a\\n'
    ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0))

    raw = b''
    for y in range(height):
        raw += b'\\x00'
        for x in range(width):
            # 中心区域金色渐变
            cx, cy = width//2, height//2
            dist = ((x-cx)**2 + (y-cy)**2)**0.5 / cx
            if dist < 0.85:  # 内圈金色
                raw += struct.pack('BBB', 255, 200, 50)
            elif dist < 0.95:  # 中圈橙色渐变
                t = (dist - 0.85) / 0.1
                rr = int(255 - (255-180)*t)
                gg = int(200 - (200-80)*t)
                bb = int(50 - (50-50)*t)
                raw += struct.pack('BBB', max(0,rr), max(0,gg), max(0,bb))
            else:  # 外圈深色
                raw += struct.pack('BBB', r, g, b)

    idat = chunk(b'IDAT', zlib.compress(raw))
    iend = chunk(b'IEND', b'')
    return header + ihdr + idat + iend

# 各密度图标尺寸
icons = {
    'mipmap-mdpi': (48, 48),
    'mipmap-hdpi': (72, 72),
    'mipmap-xhdpi': (96, 96),
    'mipmap-xxhdpi': (144, 144),
    'mipmap-xxxhdpi': (192, 192),
}

base = 'app/src/main/res'
bg_r, bg_g, bg_b = 20, 20, 50  # 深蓝紫底色

for folder, (w, h) in icons.items():
    dir_path = f'{base}/{folder}'
    os.makedirs(dir_path, exist_ok=True)
    png_data = make_png(w, h, bg_r, bg_g, bg_b)
    with open(f'{dir_path}/ic_launcher.png', 'wb') as f:
        f.write(png_data)
    print(f'  ✅ {folder}/ic_launcher.png ({w}x{h})')

# 自适应图标 (Android 8+)
anydpi = f'{base}/mipmap-anydpi-v26'
os.makedirs(anydpi, exist_ok=True)

# 背景图层
os.makedirs(f'{base}/drawable', exist_ok=True)
with open(f'{base}/drawable/ic_launcher_background.xml', 'w') as f:
    f.write('<?xml version=\"1.0\" encoding=\"utf-8\"?>\n')
    f.write('<vector xmlns:android=\"http://schemas.android.com/apk/res/android\"\n')
    f.write('    android:width=\"108dp\" android:height=\"108dp\"\n')
    f.write('    android:viewportWidth=\"108\" android:viewportHeight=\"108\">\n')
    f.write('    <path android:fillColor=\"#141432\"\n')
    f.write('        android:pathData=\"M0,0h108v108h-108z\"/>\n')
    f.write('</vector>\n')

# 前景图层 - 一个简单的 trident 形状
with open(f'{base}/drawable/ic_launcher_foreground.xml', 'w') as f:
    f.write('<?xml version=\"1.0\" encoding=\"utf-8\"?>\n')
    f.write('<vector xmlns:android=\"http://schemas.android.com/apk/res/android\"\n')
    f.write('    android:width=\"108dp\" android:height=\"108dp\"\n')
    f.write('    android:viewportWidth=\"108\" android:viewportHeight=\"108\">\n')
    f.write('    <!-- 圆形背景 -->\n')
    f.write('    <path android:fillColor=\"#FFC832\"\n')
    f.write('        android:pathData=\"M54,18A36,36 0,1 1,54,90A36,36 0,1 1,54,18Z\"/>\n')
    f.write('    <!-- A 字母 -->\n')
    f.write('    <path android:fillColor=\"#141432\"\n')
    f.write('        android:pathData=\"M54,32L40,68h28L54,32ZM50,58l4,-14l4,14h-8Z\"/>\n')
    f.write('    <!-- 底部箭头 -->\n')
    f.write('    <path android:fillColor=\"#141432\"\n')
    f.write('        android:pathData=\"M50,68h8v4h-8z\"/>\n')
    f.write('</vector>\n')

# 自适应图标 XML
with open(f'{anydpi}/ic_launcher.xml', 'w') as f:
    f.write('<?xml version=\"1.0\" encoding=\"utf-8\"?>\n')
    f.write('<adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\">\n')
    f.write('    <background android:drawable=\"@drawable/ic_launcher_background\"/>\n')
    f.write('    <foreground android:drawable=\"@drawable/ic_launcher_foreground\"/>\n')
    f.write('</adaptive-icon>\n')

print('  ✅ 自适应图标已生成')
print('🎉 AegisPhone 品牌重塑完成！')
"

      - name: Build Debug APK
        working-directory: hermes-android
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs=-Xmx4g

      - name: Upload AegisPhone APK
        uses: actions/upload-artifact@v4
        with:
          name: aegisphone-apk
          path: hermes-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
