name: Build Hermes-Agent-Phone APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Checkout Hermes-Agent-Phone
        uses: actions/checkout@v4
        with:
          repository: rfdiosuao/Hermes-Agent-phone
          path: hermes-android

      - name: Fix icon reference in manifest (drawable → mipmap)
        run: |
          sed -i 's|@drawable/ic_launcher|@mipmap/ic_launcher|g' \
            hermes-android/app/src/main/AndroidManifest.xml
          echo "✅ Manifest icon reference fixed"

      - name: Apply AgentConfig patch (phone-master 系统提示词)
        run: |
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/agent/AgentConfig.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/agent/AgentConfig.kt
          echo "✅ AgentConfig (phone-master system prompt) patch applied"

      - name: Apply DefaultAgentService patch (auto-learning)
        run: |
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/agent/DefaultAgentService.kt" \
            hermes-android/app/src/main/java/com/apk/claw/android/agent/DefaultAgentService.kt
          echo "✅ DefaultAgentService (auto-learning) patch applied"

      - name: Apply DeepSeek thinking mode patch
        run: |
          cp "${{ github.workspace }}/patches/hermes-agent/src/main/java/com/apk/claw/android/agent/langchain/http/OkHttpClientBuilderAdapter.java" \
            hermes-android/app/src/main/java/com/apk/claw/android/agent/langchain/http/OkHttpClientBuilderAdapter.java
          echo "✅ DeepSeek thinking mode patch applied"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x hermes-android/gradlew

      - name: Patch build config for CI
        working-directory: hermes-android
        run: |
          # 创建 dummy debug keystore 和 local.properties
          keytool -genkey -v -keystore debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=CI, OU=CI, O=CI, L=CI, S=CI, C=CI" 2>/dev/null
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "KEYSTORE_FILE=$(pwd)/debug.keystore" >> local.properties
          echo "KEYSTORE_PASSWORD=android" >> local.properties
          echo "KEY_ALIAS=androiddebugkey" >> local.properties
          echo "KEY_PASSWORD=android" >> local.properties

          # 添加仓库备选
          cat >> settings.gradle.kts << 'PATCH'
          dependencyResolutionManagement {
              repositories {
                  mavenCentral()
                  google()
              }
          }
          PATCH

      - name: 🔱 AegisPhone 品牌重塑（名字+图标）
        working-directory: hermes-android
        run: |
          set -e
          echo "📝 修改 App 名称..."
          find app/src/main/res -name "strings.xml" -exec sed -i 's/ApkClaw/AegisPhone/g; s/apk_claw/aegis_phone/g' {} +
          echo "🔄 替换项目中所有 ApkClaw 引用..."
          find . -type f \( -name "*.xml" -o -name "*.kt" -o -name "*.java" \) \
            -exec sed -i 's/ApkClaw/AegisPhone/g; s/apk_claw/aegis_phone/g' {} + 2>/dev/null || true
          echo "🎨 生成 AegisPhone 图标..."
          python3 "${{ github.workspace }}/scripts/generate_icons.py"

      - name: Build Debug APK
        working-directory: hermes-android
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs=-Xmx4g

      - name: Upload AegisPhone APK
        uses: actions/upload-artifact@v4
        with:
          name: aegisphone-apk
          path: hermes-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
